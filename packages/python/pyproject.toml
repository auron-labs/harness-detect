[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "harness-detect"
version = "0.2.0"
description = "Detect installed LLM harnesses and resolve their config/state paths from a JSON registry."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Auron" },
]
keywords = ["llm", "harness", "detect", "codex", "claude", "gemini"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: System :: Filesystems",
]

[project.urls]
Repository = "https://github.com/auron/harness-detect"
Issues = "https://github.com/auron/harness-detect/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/harness_detect"]

[tool.hatch.build.targets.wheel.force-include]
"src/harness_detect/data/harnesses.json" = "harness_detect/data/harnesses.json"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]
