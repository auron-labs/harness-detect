[tools]
bun = "1.3.14"
go = "1.26.4"
rust = "1.88.0"
uv = "0.8.22"
hk = "1.50.0"
ruff = "latest"

[tasks."ts:test"]
description = "Run TypeScript package tests"
dir = "packages/typescript"
run = "bun test"

[tasks."ts:types"]
description = "Type-check the TypeScript package declarations"
dir = "packages/typescript"
run = "bun run types:check"

[tasks."ts:smoke"]
description = "Run the local hermetic TypeScript fixture smoke test"
dir = "packages/typescript"
run = "bun run smoke:fixtures:local"

[tasks."ts:smoke:docker"]
description = "Run the TypeScript fixture smoke test inside Docker"
dir = "packages/typescript"
run = "bun run smoke:fixtures"

[tasks."ts:pack"]
description = "Dry-run the npm package contents"
dir = "packages/typescript"
run = "bun pm pack --dry-run"

[tasks."ts:audit"]
description = "Audit TypeScript package dependencies for vulnerabilities"
dir = "packages/typescript"
run = "bun audit"

[tasks."go:test"]
description = "Run Go package tests"
dir = "packages/golang"
run = "go test ./..."

[tasks."go:vet"]
description = "Run Go vet"
dir = "packages/golang"
run = "go vet ./..."

[tasks."go:vuln"]
description = "Run Go vulnerability checks"
dir = "packages/golang"
run = "go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./..."

[tasks."go:consumer"]
description = "Verify the Go package from a temporary external consumer module"
run = "node scripts/check-go-consumer.mjs"

[tasks."ts:perf"]
description = "Run the TypeScript hermetic perf smoke"
dir = "packages/typescript"
run = "node scripts/perf-smoke.js"

[tasks."go:perf"]
description = "Run the Go hermetic detection benchmark"
dir = "packages/golang"
run = "go test -run '^$' -bench BenchmarkDetectHarnesses -benchmem ./harnessdetect"

[tasks."rust:perf"]
description = "Run the Rust hermetic perf smoke"
dir = "packages/rust"
run = "cargo run --quiet --release --example perf_smoke"

[tasks."rust:test"]
description = "Run Rust package tests"
dir = "packages/rust"
run = "cargo test"

[tasks."rust:audit"]
description = "Audit Rust dependencies for vulnerabilities"
dir = "packages/rust"
run = [
  "cargo install cargo-audit --locked",
  "cargo audit",
]

[tasks."rust:lint"]
description = "Run Rust clippy"
dir = "packages/rust"
run = "cargo clippy --all-targets"

[tasks."rust:fmt"]
description = "Check Rust formatting"
dir = "packages/rust"
run = "cargo fmt --check"

[tasks."rust:package"]
description = "Package the Rust crate without publishing"
dir = "packages/rust"
run = "cargo package --allow-dirty"

[tasks."python:sync"]
description = "Install Python package dev dependencies"
dir = "packages/python"
run = "uv sync --dev"

[tasks."python:test"]
description = "Run Python package tests"
dir = "packages/python"
run = "uv run pytest"

[tasks."python:lint"]
description = "Run Python lint"
dir = "packages/python"
run = "uv run ruff check ."

[tasks."python:fmt"]
description = "Check Python formatting"
dir = "packages/python"
run = "uv run ruff format --check ."

[tasks."python:audit"]
description = "Audit Python dependencies for vulnerabilities"
dir = "packages/python"
run = "uv run --with pip-audit pip-audit"

[tasks."python:perf"]
description = "Run the Python hermetic perf smoke"
dir = "packages/python"
run = "uv run python scripts/perf_smoke.py"

[tasks."python:build"]
description = "Build Python wheel and source distribution without publishing"
dir = "packages/python"
run = "uv build"

[tasks."registry:check"]
description = "Verify registry copies match the canonical registry"
run = "node scripts/sync-registry.mjs --check"

[tasks."registry:sync"]
description = "Sync registry copies from the canonical registry"
run = "node scripts/sync-registry.mjs"

[tasks."parity:check"]
description = "Compare package snapshots on the shared parity fixtures"
run = "node scripts/check-package-parity.mjs"

[tasks."api:check"]
description = "Verify public API locks stay aligned across packages"
run = "node scripts/check-api-parity.mjs"

[tasks."docs:generate"]
description = "Regenerate generated docs from the registry"
run = [
  "mise run docs:env-vars:generate",
  "mise run docs:support-matrix:generate",
  "mise run docs:stats:generate",
]

[tasks."docs:env-vars:generate"]
description = "Regenerate the env-var table in docs/configuration.md from the registry"
dir = "packages/typescript"
run = "node scripts/generate-env-table.js > /tmp/env-table.md && node -e \"const fs=require('fs');const doc=fs.readFileSync('../../docs/configuration.md','utf8');const table=fs.readFileSync('/tmp/env-table.md','utf8').trim();const re=/<!-- BEGIN: env-var-table -->[\\s\\S]*?<!-- END: env-var-table -->/;const rep='<!-- BEGIN: env-var-table -->\\n\\n'+table+'\\n\\n<!-- END: env-var-table -->';const out=doc.replace(re,rep);if(out===doc){if(re.test(doc)){console.log('env-var table already up to date');}else{console.error('env-var markers not found');process.exit(1);}}else{fs.writeFileSync('../../docs/configuration.md',out);console.log('env-var table regenerated');}\""

[tasks."docs:support-matrix:generate"]
description = "Regenerate docs/support-matrix.md from the registry"
run = "node scripts/generate-support-matrix.mjs"

[tasks."docs:support-matrix:check"]
description = "Verify docs/support-matrix.md matches the registry"
run = "node scripts/generate-support-matrix.mjs --check"

[tasks."docs:env-vars:check"]
description = "Verify the env-var table in docs/configuration.md matches the registry"
dir = "packages/typescript"
run = "node -e \"const fs=require('fs');const {spawnSync}=require('child_process');const doc=fs.readFileSync('../../docs/configuration.md','utf8');const match=doc.match(/<!-- BEGIN: env-var-table -->([\\s\\S]*?)<!-- END: env-var-table -->/);if(!match){console.error('docs/configuration.md must contain env-var table markers');process.exit(1);}const result=spawnSync('node',['scripts/generate-env-table.js'],{cwd:process.cwd(),encoding:'utf8'});if(result.status!==0){process.stderr.write(result.stderr||'');process.exit(result.status??1);}const actual=match[1].trim();const expected=result.stdout.trim();if(actual!==expected){console.error('docs/configuration.md env-var table is stale. Run: mise run docs:generate');process.exit(1);}console.log('docs/configuration.md env-var table is up to date.');\""

[tasks."docs:stats:generate"]
description = "Regenerate Automd repository stats in documentation"
dir = "packages/typescript"
run = "bunx automd --dir ../.."

[tasks."docs:stats:check"]
description = "Verify Automd repository stats in documentation are up to date"
dir = "packages/typescript"
run = "bunx automd --dir ../.. && git -C ../.. diff --exit-code -- README.md docs/index.md docs/api.md docs/configuration.md"

[tasks."docs:check"]
description = "Verify generated docs are up to date"
run = [
  "mise run docs:env-vars:check",
  "mise run docs:support-matrix:check",
  "mise run docs:stats:check",
]

[tasks.test]
description = "Run package tests"
depends = ["ts:test", "go:test", "rust:test", "python:test"]

[tasks."security:audit"]
description = "Run package dependency vulnerability audits"
depends = ["ts:audit", "go:vuln", "rust:audit", "python:audit"]

[tasks.smoke]
description = "Run the local hermetic fixture smoke test"
depends = ["ts:smoke"]

[tasks.smoketest]
description = "Alias for the local hermetic fixture smoke test"
depends = ["smoke"]

[tasks."smoke:docker"]
description = "Run the Docker fixture smoke test"
depends = ["ts:smoke:docker"]

[tasks."smoketest:docker"]
description = "Alias for the Docker fixture smoke test"
depends = ["smoke:docker"]

[tasks.verify]
description = "Run all local release verification checks"
run = [
  "mise run registry:check",
  "mise run docs:check",
  "mise run ts:test",
  "mise run ts:audit",
  "mise run ts:types",
  "mise run ts:smoke",
  "mise run ts:pack",
  "mise run api:check",
  "mise run go:test",
  "mise run go:vet",
  "mise run go:vuln",
  "mise run go:consumer",
  "mise run rust:fmt",
  "mise run rust:lint",
  "mise run rust:test",
  "mise run rust:package",
  "mise run rust:audit",
  "mise run python:sync",
  "mise run parity:check",
  "mise run python:lint",
  "mise run python:fmt",
  "mise run python:test",
  "mise run python:build",
  "mise run python:audit",
]

[tasks.perf]
description = "Run hermetic performance reports for all packages"
run = [
  "mise run ts:perf",
  "mise run go:perf",
  "mise run rust:perf",
  "mise run python:perf",
]

[tasks.lint]
description = "Run all linters"
depends = ["go:vet", "rust:lint", "python:lint"]

[tasks.format]
description = "Check formatting across all packages"
depends = ["rust:fmt", "python:fmt"]

[tasks.check]
description = "Run hk checks against all files"
run = "hk check --all"

[tasks.fix]
description = "Auto-fix lint and format issues via hk"
run = "hk fix"
